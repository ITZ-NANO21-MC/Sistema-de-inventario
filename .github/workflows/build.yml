name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: sqlite:///inventario.db

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Setup Python
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 4. Prepare Backend (Create structure and install pip dependencies)
      - name: Prepare Backend Environment
        working-directory: entorno_electron
        run: |
          cmd.exe /c "prepare_backend.bat"

      # 5. Build backend with PyInstaller
      - name: Build backend executable
        working-directory: entorno_electron\backend
        run: |
          call venv\Scripts\activate.bat
          pip install pyinstaller
          pyinstaller backend.spec --noconfirm

      # 6. Run post-build structure creation (creates data/ dir for DB)
      # In prepare_backend.bat there is a post-build logic to copy .env if it exists
      # But since we just built PyInstaller, we can run prepare_backend.bat again to trigger the post-build block.
      - name: Setup Production Data Directory
        working-directory: entorno_electron
        run: |
          cmd.exe /c "prepare_backend.bat"

      # 7. Download cloudflared for Windows
      - name: Download cloudflared
        run: |
          New-Item -ItemType Directory -Force -Path "entorno_electron/resources/binaries"
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "entorno_electron/resources/binaries/cloudflared.exe"

      # 8. Install Node dependencies
      - name: Install Electron dependencies
        working-directory: entorno_electron
        run: npm install

      # 9. Build Windows installer
      - name: Build NSIS installer
        working-directory: entorno_electron
        run: npm run build:win

      # 10. Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: entorno_electron/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
